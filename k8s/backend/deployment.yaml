apiVersion: apps/v1
kind: Deployment

metadata:
  name: backend

spec:
  replicas: 2

  selector:
    matchLabels:
      app: backend

  template:
    metadata:
      labels:
        app: backend

    spec:
      containers:
        - name: backend

          image: vitorrodrigues3794/guess-game-backend:latest

          ports:
            - containerPort: 5000

          resources:
            requests:
              cpu: "100m"
            limits:
              cpu: "500m"

          env:
            - name: FLASK_DB_TYPE
              value: postgres

            - name: FLASK_DB_USER
              value: postgres

            - name: FLASK_DB_PASSWORD
              value: secretpass

            - name: FLASK_DB_NAME
              value: postgres

            - name: FLASK_DB_HOST
              value: postgres

            - name: FLASK_DB_PORT
              value: "5432"

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"

            limits:
              cpu: "500m"
              memory: "256Mi"
